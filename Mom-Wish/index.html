<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Women's Day ❤️| Mom</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --accent: #ff4d6d;
            --gold: #ffd700;
            --glass: rgba(255, 255, 255, 0.12);
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Segoe UI', sans-serif;
            background: #000; color: white;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }

        /* Dynamic Background */
        #bgLayer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            filter: blur(25px) brightness(0.3);
            z-index: -1; transition: background-image 2s ease-in-out;
        }

        /* Glass Card */
        .wish-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 40px; border-radius: 40px;
            text-align: center; width: 85%; max-width: 420px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            transform: scale(0.9); opacity: 0;
            transition: all 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .wish-card.show {
            transform: scale(1); opacity: 1;
        }

        /* Profile Slideshow */
        .slideshow {
            position: relative; width: 220px; height: 220px;
            margin: 0 auto 25px; border-radius: 50%;
            overflow: hidden; border: 4px solid white;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
        }

        .slideshow img {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; opacity: 0; transition: opacity 1.5s ease;
        }

        .slideshow img.active { opacity: 1; }

        h1 { font-size: 2rem; margin: 10px 0; color: var(--gold); text-shadow: 0 0 10px rgba(255,215,0,0.3); }
        .quote { font-style: italic; font-size: 1.1rem; line-height: 1.6; color: #eee; }

        /* Floating Music Toggle */
        .music-toggle {
            position: fixed; bottom: 30px; right: 30px;
            width: 55px; height: 55px;
            background: var(--accent);
            border-radius: 50%; border: none;
            color: white; font-size: 22px;
            cursor: pointer; z-index: 100;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 5px 20px rgba(255, 77, 109, 0.5);
        }

        /* Start Overlay */
        #startOverlay {
            position: fixed; inset: 0; background: #111;
            z-index: 1000; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
        }

        .start-btn {
            padding: 18px 45px; border-radius: 50px; border: none;
            background: linear-gradient(45deg, var(--accent), #ff8a5c);
            color: white; font-size: 1.3rem; font-weight: bold;
            cursor: pointer; box-shadow: 0 10px 30px rgba(255, 77, 109, 0.4);
            transition: 0.3s;
        }

        .start-btn:hover { transform: scale(1.05); }
    </style>
</head>
<body>

    <div id="startOverlay">
        <button class="start-btn" onclick="celebrate()">Tap to Wish Mom ❤️</button>
    </div>

    <div id="bgLayer"></div>

    <button class="music-toggle" id="musicBtn" onclick="toggleMusic()" style="display:none;">
        <span id="musicIcon">🎵</span>
    </button>

        <p class="quote">"To the most beautiful person in my life—your strength and love make me who I am today. I love you, Mom💖💗💝
!"</p>
    </div>

    <audio id="bgMusic" loop>
        <source src="Pedave Palikina-SenSongsMp3.Co.mp3" type="audio/mpeg">
    </audio>

    <script>
        const images = document.querySelectorAll('#slideshow img');
        const bgLayer = document.getElementById('bgLayer');
        const audio = document.getElementById('bgMusic');
        const musicBtn = document.getElementById('musicBtn');
        const card = document.getElementById('card');
        let index = 0;

        function celebrate() {
            // 1. Hide Overlay
            document.getElementById('startOverlay').style.display = 'none';
            
            // 2. Show Card and Music Button
            card.classList.add('show');
            musicBtn.style.display = 'flex';
            
            // 3. Play Music
            audio.play().catch(e => console.log("Audio play blocked"));

            // 4. Burst Confetti
            var duration = 3 * 1000;
            var end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 5,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: ['#ff4d6d', '#ffd700', '#ffffff']
                });
                confetti({
                    particleCount: 5,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: ['#ff4d6d', '#ffd700', '#ffffff']
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());

            // 5. Start Slideshow
            bgLayer.style.backgroundImage = `url('${images[0].src}')`;
            setInterval(rotateImages, 4500);
        }

        function rotateImages() {
            images[index].classList.remove('active');
            index = (index + 1) % images.length;
            images[index].classList.add('active');
            bgLayer.style.backgroundImage = `url('${images[index].src}')`;
        }

        function toggleMusic() {
            const icon = document.getElementById('musicIcon');
            if (audio.paused) {
                audio.play();
                icon.innerText = "🎵";
            } else {
                audio.pause();
                icon.innerText = "🔇";
            }
        }
    </script>
</body>
</html>
